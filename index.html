<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#071018">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>8-bit memory</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="game">
    <main class="app-shell">
      <header class="app-header header">
      <h1>8-bit memory</h1>
      <p>Vind de 8 paren</p>
    </header>

    <section class="status-row stats" aria-live="polite">
      <div class="status-block">
        <span class="status-label">Pogingen</span>
        <strong id="attemptCount">0</strong>
      </div>
      <div class="status-block">
        <span class="status-label">Timer</span>
        <strong id="timer">00:00</strong>
      </div>
    </section>

    <section class="highscore-panel" aria-label="Highscores">
      <div class="highscore-values">
        <p><span>Minste pogingen</span><strong id="bestAttempts">--</strong></p>
        <p><span>Beste tijd</span><strong id="bestTime">--:--</strong></p>
      </div>
    </section>

    <section class="game-board board" id="gameBoard" aria-label="Memory spelbord"></section>

    <div class="game-footer actions">
      <p id="message" class="message"></p>
      <button id="newGameButton" class="action-button">Nieuw spel</button>
    </div>
  </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
