<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>8-bit memory</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <h1>8-bit memory</h1>
      <p>Vind de 8 paren</p>
    </header>

    <section class="status-row" aria-live="polite">
      <div class="status-block">
        <span class="status-label">Zetten</span>
        <strong id="moveCount">0</strong>
      </div>
      <div class="status-block">
        <span class="status-label">Timer</span>
        <strong id="timer">00:00</strong>
      </div>
    </section>

    <section class="game-board" id="gameBoard" aria-label="Memory spelbord"></section>

    <div class="game-footer">
      <p id="message" class="message"></p>
      <button id="newGameButton" class="action-button">Nieuw spel</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
